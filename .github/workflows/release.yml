name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild -project ActionSense.xcodeproj \
            -scheme ActionSense \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-"

      - name: Package DMG
        run: |
          APP_PATH=$(find ./build -name "ActionSense.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          # 创建临时目录，放入 app 和 /Applications 快捷方式
          DMG_DIR="./dmg_staging"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname ActionSense \
            -srcfolder "$DMG_DIR" \
            -format UDZO \
            -fs HFS+ \
            ActionSense.dmg
          rm -rf "$DMG_DIR"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ActionSense.dmg
          generate_release_notes: true
