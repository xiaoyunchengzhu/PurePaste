name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild -project PurePaste.xcodeproj \
            -scheme PurePaste \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package DMG
        run: |
          APP_PATH=$(find ./build -name "PurePaste.app" -type d | head -1)
          hdiutil create -volname PurePaste \
            -srcfolder "$APP_PATH" \
            -format UDZO \
            PurePaste.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PurePaste.dmg
          generate_release_notes: true
